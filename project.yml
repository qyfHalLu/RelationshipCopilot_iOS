# RelationshipCopilot - XcodeGen Configuration
name: RelationshipCopilot
options:
  bundleIdPrefix: com.relationshipcopilot
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  RelationshipCopilot:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Data
      - path: Presentation
      - path: Services
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.relationshipcopilot.app
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/RelationshipCopilot.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - target: RelationshipCopilotWidgetExtension
        embed: true

  RelationshipCopilotWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: RelationshipCopilotWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.relationshipcopilot.app.widget
        INFOPLIST_FILE: RelationshipCopilotWidget/Info.plist
        SKIP_INSTALL: YES
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground

schemes:
  RelationshipCopilot:
    build:
      targets:
        RelationshipCopilot: all
        RelationshipCopilotWidgetExtension: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release